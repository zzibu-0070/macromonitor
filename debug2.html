<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>MacroLens — FRED 전체 시리즈 진단</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",monospace;padding:16px;background:#0d1117;color:#e6edf3;font-size:12px;}
h1{color:#f0b429;margin-bottom:4px;font-size:15px;}
.sub{color:#8b949e;font-size:11px;margin-bottom:16px;}
.section{margin-bottom:16px;}
.sec-title{font-size:11px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #21262d;padding-bottom:4px;margin-bottom:8px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px;}
.row{background:#161b22;border:1px solid #21262d;border-radius:5px;padding:7px 10px;display:flex;align-items:center;gap:8px;}
.row.ok{border-color:#238636;}
.row.err{border-color:#f85149;}
.row.warn{border-color:#f0b429;}
.row.loading{border-color:#388bfd;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.ok{background:#3fb950;}
.dot.err{background:#f85149;}
.dot.warn{background:#f0b429;}
.dot.loading{background:#388bfd;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.id{color:#388bfd;font-weight:700;width:170px;flex-shrink:0;font-size:11px;}
.val{color:#3fb950;flex:1;font-size:11px;}
.val.err{color:#f85149;}
.val.warn{color:#f0b429;}
.date{color:#656d76;font-size:10px;margin-left:auto;}
.summary{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px 14px;margin-bottom:12px;display:flex;gap:20px;}
.sm{font-size:18px;font-weight:800;}
.sm-ok{color:#3fb950;} .sm-err{color:#f85149;} .sm-warn{color:#f0b429;}
.sm-lbl{font-size:9px;color:#8b949e;margin-top:1px;}
button{background:#238636;color:#fff;border:none;padding:7px 16px;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit;}
button:hover{background:#2ea043;}
</style>
</head>
<body>
<h1>🔬 MacroLens — FRED 전체 시리즈 진단</h1>
<div class="sub">모든 FRED 시리즈 ID 유효성 및 최신 데이터 수신 여부 확인</div>

<div style="display:flex;gap:8px;margin-bottom:14px;">
  <button onclick="runAll()">🚀 전체 테스트 실행</button>
  <button onclick="location.reload()" style="background:#21262d;">새로고침</button>
</div>

<div class="summary" id="summary" style="display:none;">
  <div><div class="sm sm-ok" id="cnt-ok">0</div><div class="sm-lbl">성공</div></div>
  <div><div class="sm sm-err" id="cnt-err">0</div><div class="sm-lbl">실패</div></div>
  <div><div class="sm sm-warn" id="cnt-warn">0</div><div class="sm-lbl">경고(빈값)</div></div>
  <div><div class="sm" style="color:#e6edf3;" id="cnt-total">0</div><div class="sm-lbl">전체</div></div>
</div>

<div id="sections"></div>

<script>
const WORKER = 'https://macrolens-worker.macrolens.workers.dev';

const SERIES_MAP = [
  {
    section: 'A. 금융 배관 (Plumbing)',
    series: [
      {id:'TOTRESNS',    label:'은행 준비금 (총액)',          note:'백만달러, 주간'},
      {id:'SOFR',        label:'SOFR 금리',                   note:'%'},
      {id:'IORB',        label:'IORB 금리',                   note:'%'},
      {id:'RRPONTSYD',   label:'ON RRP 역레포 잔액',          note:'십억달러'},
      {id:'WTREGEN',     label:'TGA 재무부 일반계정',         note:'백만달러, 주간'},
      {id:'BAMLH0A0HYM2',label:'HY OAS (ICE BofA)',           note:'bp'},
      {id:'DTWEXBGS',    label:'광의 달러지수 (Broad)',       note:'주간'},
      {id:'DRTSCILM',    label:'SLOOS C&I 대출 기준 강화%',   note:'분기'},
      {id:'WRMFNS',      label:'MMF 소매 (WRMFNS)',            note:'십억달러'},
      {id:'WRMFSL',      label:'MMF 기관 (WRMFSL)',            note:'십억달러'},
      {id:'PDPOSCLC',    label:'PD 회사채 포지션 (FRED부분)', note:'백만달러'},
      {id:'DEXUSEU',     label:'USD/EUR 환율 (CC Basis 프록시)',note:'일간'},
    ]
  },
  {
    section: 'B. 금리 & 채권',
    series: [
      {id:'DGS2',    label:'2년 국채 금리'},
      {id:'DGS5',    label:'5년 국채 금리'},
      {id:'DGS10',   label:'10년 국채 금리'},
      {id:'DGS30',   label:'30년 국채 금리'},
      {id:'T10Y2Y',  label:'2s10s 스프레드'},
      {id:'T10Y3M',  label:'3m10y 스프레드'},
      {id:'DFII10',  label:'TIPS 10Y 실질금리'},
      {id:'T10YIE',  label:'BEI 기대인플레 10Y'},
      {id:'EFFR',    label:'실효 Fed Funds Rate'},
    ]
  },
  {
    section: 'C. 물가 & 원자재',
    series: [
      {id:'CPIAUCSL',       label:'CPI (헤드라인)',      note:'월간, 지수값 → YoY 계산 필요'},
      {id:'CPILFESL',       label:'Core CPI',            note:'월간'},
      {id:'PPIACO',         label:'PPI All Commodities', note:'월간'},
      {id:'PCEPI',          label:'PCE 디플레이터',      note:'월간'},
      {id:'MICH',           label:'미시간 인플레 기대',  note:'월간'},
      {id:'DCOILWTICO',     label:'WTI 유가',            note:'일간'},
      {id:'DCOILBRENTEU',   label:'Brent 유가',          note:'일간'},
      {id:'DHHNGSP',        label:'천연가스 Henry Hub',  note:'일간'},
      {id:'PCOPPUSDM',      label:'구리 현물가',         note:'월간'},
      {id:'PALUMUSDM',      label:'알루미늄 현물가',     note:'월간'},
      {id:'PWHEAMTUSDM',    label:'밀(Wheat) 현물가',    note:'월간'},
      {id:'CPMNACSABB',     label:'중국 PMI (FRED)', note:'월간 — 없으면 대체 필요'},
    ]
  },
  {
    section: 'D. 고용 & 경기',
    series: [
      {id:'UNRATE',         label:'실업률 (U-3)',        note:'월간'},
      {id:'PAYEMS',         label:'비농업 신규고용 NFP', note:'월간, 천명'},
      {id:'ICSA',           label:'신규 실업수당 청구',  note:'주간'},
      {id:'SAHMREALTIME',   label:'샴 룰 지수',          note:'월간'},
      {id:'CIVPART',        label:'경제활동참가율',      note:'월간'},
      {id:'USSLIND',        label:'LEI 경기선행지수',    note:'월간'},
      {id:'MANEMP',         label:'제조업 고용 (ISM 대체)',note:'ISM PMI 직접 없음'},
      {id:'NAPMPMI',        label:'ISM 제조업 PMI 시도', note:'없으면 404'},
    ]
  },
  {
    section: 'E. 소비 & 신뢰',
    series: [
      {id:'UMCSENT',           label:'미시간 소비자신뢰'},
      {id:'CSCICP03USM665S',   label:'Conference Board 소비자신뢰'},
      {id:'RSAFS',             label:'소매판매 총액',     note:'백만달러'},
      {id:'RSXFS',             label:'소매판매 (자동차 제외)', note:'대안'},
      {id:'PSAVERT',           label:'개인저축률',        note:'%'},
      {id:'DRCCLACBS',         label:'신용카드 연체율',   note:'분기'},
    ]
  },
  {
    section: 'F. 글로벌 & 위험자산',
    series: [
      {id:'VIXCLS',           label:'VIX 공포지수'},
      {id:'SP500',             label:'S&P 500'},
      {id:'GOLDAMGBD228NLBM', label:'금 현물가 (런던 AM Fix)', note:'USD/troy oz'},
      {id:'SLVPRUSD',          label:'은 현물가 시도',    note:'없으면 대안 필요'},
      {id:'DTWEXBGS',          label:'광의 달러지수',     note:'A모듈과 공유'},
      {id:'DEXKOUS',           label:'원달러 환율 (USD/KRW)', note:'일간'},
      {id:'DEXJPUS',           label:'달러엔 환율 (USD/JPY)', note:'일간'},
      {id:'DGS10',             label:'미국 10Y (한미 스프레드용)', note:'B모듈과 공유'},
    ]
  },
];

let stats = {ok:0, err:0, warn:0};

async function testSeries(id) {
  try {
    const r = await fetch(`${WORKER}/fred?series_id=${id}&limit=3&sort_order=desc`);
    if (!r.ok) return {status:'err', msg:`HTTP ${r.status}`};
    const j = await r.json();
    if (j.error) return {status:'err', msg:j.error};
    const obs = (j.observations||[]).filter(o=>o.value!=='.');
    if (!obs.length) return {status:'warn', msg:'데이터 없음 (모두 "." 값)', date:j.observations?.[0]?.date};
    return {status:'ok', value:obs[0].value, date:obs[0].date, unit:j.units};
  } catch(e) {
    return {status:'err', msg:e.message};
  }
}

function createRow(id, label, note) {
  const rowId = 'row-'+id.replace(/[^a-zA-Z0-9]/g,'_');
  return `<div class="row loading" id="${rowId}">
    <div class="dot loading" id="dot-${rowId}"></div>
    <div class="id">${id}</div>
    <div class="val" id="val-${rowId}">테스트중...</div>
    <div class="date" id="date-${rowId}">${note||label}</div>
  </div>`;
}

function updateRow(id, result) {
  const rowId = 'row-'+id.replace(/[^a-zA-Z0-9]/g,'_');
  const row = document.getElementById(rowId);
  const dot = document.getElementById('dot-'+rowId);
  const val = document.getElementById('val-'+rowId);
  const dateEl = document.getElementById('date-'+rowId);
  if (!row) return;
  row.className = 'row '+result.status;
  dot.className = 'dot '+result.status;
  if (result.status==='ok') {
    val.className='val';
    val.textContent = result.value + (result.unit?' ('+result.unit+')':'');
    dateEl.textContent = result.date||'';
    stats.ok++;
  } else if (result.status==='warn') {
    val.className='val warn';
    val.textContent = result.msg;
    dateEl.textContent = result.date||'';
    stats.warn++;
  } else {
    val.className='val err';
    val.textContent = result.msg;
    stats.err++;
  }
  updateSummary();
}

function updateSummary() {
  document.getElementById('summary').style.display='flex';
  document.getElementById('cnt-ok').textContent=stats.ok;
  document.getElementById('cnt-err').textContent=stats.err;
  document.getElementById('cnt-warn').textContent=stats.warn;
  document.getElementById('cnt-total').textContent=stats.ok+stats.err+stats.warn;
}

async function runAll() {
  stats={ok:0,err:0,warn:0};
  const container = document.getElementById('sections');
  container.innerHTML = '';

  // 섹션별 HTML 생성
  for (const sec of SERIES_MAP) {
    const div = document.createElement('div');
    div.className='section';
    div.innerHTML = `<div class="sec-title">${sec.section}</div><div class="grid">${
      sec.series.map(s=>createRow(s.id, s.label, s.note)).join('')
    }</div>`;
    container.appendChild(div);
  }

  // 병렬 테스트 실행
  const all = SERIES_MAP.flatMap(s=>s.series);
  await Promise.allSettled(all.map(async s => {
    const result = await testSeries(s.id);
    updateRow(s.id, result);
  }));
}

runAll();
</script>
</body>
</html>
